# ============================================================
# EXERCISE 2: Node.js App Pipeline
# Focus: Build + Test + Lint stages
# ============================================================
name: Ex2 - Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' 

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true 

      - name: Run tests
        run: npm test

      - name: Display test coverage
        if: always()
        run: |
          echo "--- Pipeline Summary ---"
          echo "Job: build-and-test"
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
